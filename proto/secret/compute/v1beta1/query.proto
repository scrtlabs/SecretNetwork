syntax = "proto3";
package secret.compute.v1beta1;

import "gogoproto/gogo.proto";
import "secret/compute/v1beta1/types.proto";
import "secret/compute/v1beta1/params.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "cosmos/base/abci/v1beta1/abci.proto";
import "cosmos/base/query/v1beta1/pagination.proto";

option go_package = "github.com/scrtlabs/SecretNetwork/x/compute/internal/types";
option (gogoproto.goproto_getters_all) = false;
option (gogoproto.equal_all) = true;

// Query defines the gRPC querier service
service Query {
  // Query contract info by address
  rpc ContractInfo(QueryByContractAddressRequest)
      returns (QueryContractInfoResponse) {
    option (google.api.http).get = "/compute/v1beta1/info/{contract_address}";
  }
  // Query code info by id
  rpc ContractsByCodeId(QueryByCodeIdRequest)
      returns (QueryContractsByCodeIdResponse) {
    option (google.api.http).get = "/compute/v1beta1/contracts/{code_id}";
  }
  // Query secret contract
  rpc QuerySecretContract(QuerySecretContractRequest)
      returns (QuerySecretContractResponse) {
    option (google.api.http).get = "/compute/v1beta1/query/{contract_address}";
  }
  // Query a specific contract code by id
  rpc Code(QueryByCodeIdRequest) returns (QueryCodeResponse) {
    option (google.api.http).get = "/compute/v1beta1/code/{code_id}";
  }
  // Query all contract codes on-chain
  rpc Codes(google.protobuf.Empty) returns (QueryCodesResponse) {
    option (google.api.http).get = "/compute/v1beta1/codes";
  }
  // Query code hash by contract address
  rpc CodeHashByContractAddress(QueryByContractAddressRequest)
      returns (QueryCodeHashResponse) {
    option (google.api.http).get =
        "/compute/v1beta1/code_hash/by_contract_address/{contract_address}";
  }
  // Query code hash by code id
  rpc CodeHashByCodeId(QueryByCodeIdRequest) returns (QueryCodeHashResponse) {
    option (google.api.http).get =
        "/compute/v1beta1/code_hash/by_code_id/{code_id}";
  }
  // Query contract label by address
  rpc LabelByAddress(QueryByContractAddressRequest)
      returns (QueryContractLabelResponse) {
    option (google.api.http).get = "/compute/v1beta1/label/{contract_address}";
  }
  // Query contract address by label
  rpc AddressByLabel(QueryByLabelRequest)
      returns (QueryContractAddressResponse) {
    option (google.api.http).get = "/compute/v1beta1/contract_address/{label}";
  }
  // ContractHistory gets the contract code history
  rpc ContractHistory(QueryContractHistoryRequest)
      returns (QueryContractHistoryResponse) {
    option (google.api.http).get =
        "/compute/v1beta1/contract_history/{contract_address}";
  }
  // Params defines a gRPC query method that returns the compute
  // module's parameters.
  rpc Params(ParamsRequest) returns (ParamsResponse) {
    option (google.api.http).get = "/compute/v1beta1/params";
  }
  // Query authorized migration for a contract
  rpc AuthorizedMigration(QueryAuthorizedMigrationRequest) returns (QueryAuthorizedMigrationResponse) {
    option (google.api.http).get = "/compute/v1beta1/authorized_migration/{contract_address}";
  }
  // Query authorized admin update for a contract
  rpc AuthorizedAdminUpdate(QueryAuthorizedAdminUpdateRequest) returns (QueryAuthorizedAdminUpdateResponse) {
    option (google.api.http).get = "/compute/v1beta1/authorized_admin_update/{contract_address}";
  }

  // Query ecall record for a specific block height (for non-SGX node sync)
  rpc EcallRecord(QueryEcallRecordRequest) returns (QueryEcallRecordResponse) {
    option (google.api.http).get = "/compute/v1beta1/ecall/{height}";
  }

  // Query ecall records for a range of block heights (batch sync)
  rpc EcallRecords(QueryEcallRecordsRequest) returns (QueryEcallRecordsResponse) {
    option (google.api.http).get = "/compute/v1beta1/ecalls";
  }

  // Query network pubkey by block height and seed index (for non-SGX node sync)
  rpc NetworkPubkey(QueryNetworkPubkeyRequest) returns (QueryNetworkPubkeyResponse) {
    option (google.api.http).get = "/compute/v1beta1/network_pubkey/{height}/{i_seed}";
  }

  // Query encrypted seed by certificate hash (for non-SGX node sync)
  rpc EncryptedSeed(QueryEncryptedSeedRequest) returns (QueryEncryptedSeedResponse) {
    option (google.api.http).get = "/compute/v1beta1/encrypted_seed/{cert_hash}";
  }

  // Query all execution traces for a block (batch fetch for non-SGX node sync)
  rpc BlockTraces(QueryBlockTracesRequest) returns (QueryBlockTracesResponse) {
    option (google.api.http).get = "/compute/v1beta1/block_traces/{height}";
  }

  // Query machine ID proof for a specific block height and machine ID (for non-SGX node sync)
  rpc MachineIDProof(QueryMachineIDProofRequest) returns (QueryMachineIDProofResponse) {
    option (google.api.http).get = "/compute/v1beta1/machine_id_proof/{height}/{machine_id}";
  }

  // Analyze code to determine IBC entry points and required features
  rpc AnalyzeCode(QueryAnalyzeCodeRequest) returns (QueryAnalyzeCodeResponse) {
    option (google.api.http).get = "/compute/v1beta1/analyze_code";
  }

  // Query all Create (MsgStoreCode) results for a block (for non-SGX node sync)
  rpc BlockCreateResults(QueryBlockCreateResultsRequest) returns (QueryBlockCreateResultsResponse) {
    option (google.api.http).get = "/compute/v1beta1/block_create_results/{height}";
  }

}

// ParamsRequest is the request type for the Query/Params RPC method.
message ParamsRequest {}

// ParamsResponse is the response type for the Query/Params RPC method.
message ParamsResponse {
  option (gogoproto.equal) = false;
  // params defines the parameters of the module.
  Params params = 1 [ (gogoproto.nullable) = false ];
}

message QuerySecretContractRequest {
  // address is the bech32 human readable address of the contract
  string contract_address = 1;
  bytes query = 2;
}

message QueryByLabelRequest { string label = 1; }

message QueryByContractAddressRequest {
  // address is the bech32 human readable address of the contract
  string contract_address = 1;
}

message QueryByCodeIdRequest { uint64 code_id = 1; }

message QuerySecretContractResponse { bytes data = 1; }

// QueryContractInfoResponse is the response type for the Query/ContractInfo RPC
// method
message QueryContractInfoResponse {
  // contract_address is the bech32 human readable address of the contract
  string contract_address = 1;
  ContractInfo contract_info = 2
      [ (gogoproto.embed) = true, (gogoproto.jsontag) = "" ];
}

// ContractInfoWithAddress adds the contract address to the ContractInfo
// representation
message ContractInfoWithAddress {
  // contract_address is the bech32 human readable address of the contract
  string contract_address = 1;
  ContractInfo contract_info = 2
      [ (gogoproto.embed) = true, (gogoproto.jsontag) = "" ];
}

message QueryContractsByCodeIdResponse {
  repeated ContractInfoWithAddress contract_infos = 1
      [ (gogoproto.nullable) = false ];
}

message CodeInfoResponse {
  uint64 code_id = 1;
  // creator is the bech32 human readable address of the contract
  string creator = 2;
  string code_hash = 3;
  string source = 4;
  string builder = 5;
}

message QueryCodeResponse {
  CodeInfoResponse code_info = 1
      [ (gogoproto.embed) = true, (gogoproto.jsontag) = "" ];
  bytes wasm = 2;
}

message QueryCodesResponse {
  repeated CodeInfoResponse code_infos = 1 [ (gogoproto.nullable) = false ];
}

message QueryContractAddressResponse {
  // address is the bech32 human readable address of the contract
  string contract_address = 1;
}

message QueryContractLabelResponse { string label = 1; }

message QueryCodeHashResponse { string code_hash = 1; }

// DecryptedAnswer is a struct that represents a decrypted tx-query
message DecryptedAnswer {
  option (gogoproto.equal) = false;

  string type = 1;
  string input = 2;
  string output_data = 3;
  string output_data_as_string = 4;
}

message DecryptedAnswers {
  option (gogoproto.equal) = false;

  repeated DecryptedAnswer answers = 1;
  repeated cosmos.base.abci.v1beta1.StringEvent output_logs = 2
      [ (gogoproto.nullable) = false ];
  string output_error = 3;
  string plaintext_error = 4;
}

// QueryContractHistoryRequest is the request type for the Query/ContractHistory
// RPC method
message QueryContractHistoryRequest {
  option (gogoproto.equal) = false;
  // address is the address of the contract to query
  string contract_address = 1;
}

// QueryContractHistoryResponse is the response type for the
// Query/ContractHistory RPC method
message QueryContractHistoryResponse {
  option (gogoproto.equal) = false;

  repeated ContractCodeHistoryEntry entries = 1
      [ (gogoproto.nullable) = false ];
}

message QueryAuthorizedMigrationRequest {
  // Contract address to query
  string contract_address = 1;
}

message QueryAuthorizedMigrationResponse {
  // Authorized code ID (if any)
  uint64 new_code_id = 1 [ (gogoproto.customname) = "NewCodeID" ];
}


message QueryAuthorizedAdminUpdateRequest {
  // Contract address to query
  string contract_address = 1;
}

message QueryAuthorizedAdminUpdateResponse {
  // Authorized new admin address (empty string if removing admin, or if no authorization)
  string new_admin = 1;
}

// QueryEcallRecordRequest is the request type for the Query/EcallRecord RPC method
message QueryEcallRecordRequest {
  // Block height to query ecall record for
  int64 height = 1;
}

// QueryEcallRecordResponse is the response type for the Query/EcallRecord RPC method
message QueryEcallRecordResponse {
  // Block height
  int64 height = 1;
  // Random seed from SubmitBlockSignatures (32 bytes)
  bytes random_seed = 2;
  // Validator set evidence from SubmitBlockSignatures (32 bytes)
  bytes validator_set_evidence = 3;
}

// QueryNetworkPubkeyRequest is the request type for the Query/NetworkPubkey RPC
message QueryNetworkPubkeyRequest {
  // Block height to query network pubkey for
  int64 height = 1;
  // Seed index
  uint32 i_seed = 2;
}

// QueryNetworkPubkeyResponse is the response type for the Query/NetworkPubkey RPC
message QueryNetworkPubkeyResponse {
  bytes node_pubkey = 1;
  bytes io_pubkey = 2;
}

// QueryEcallRecordsRequest is the request type for the Query/EcallRecords RPC method
message QueryEcallRecordsRequest {
  // Start block height (inclusive)
  int64 start_height = 1;
  // End block height (inclusive)
  int64 end_height = 2;
}

// QueryEcallRecordsResponse is the response type for the Query/EcallRecords RPC method
message QueryEcallRecordsResponse {
  // List of ecall records
  repeated QueryEcallRecordResponse records = 1 [ (gogoproto.nullable) = false ];
}

// QueryEncryptedSeedRequest is the request type for the Query/EncryptedSeed RPC method
message QueryEncryptedSeedRequest {
  // Certificate hash (hex encoded sha256 of certificate)
  string cert_hash = 1;
  // Block height at which the seed was recorded (required for per-height keying)
  int64 height = 2;
}

// QueryEncryptedSeedResponse is the response type for the Query/EncryptedSeed RPC method
message QueryEncryptedSeedResponse {
  // Encrypted seed data
  bytes encrypted_seed = 1;
  // Machine binding
  bytes machine_binding = 2;
}

// StorageOp represents a single storage operation (Set or Delete)
message StorageOp {
  // True if this is a delete operation, false for set
  bool is_delete = 1;
  // Storage key
  bytes key = 2;
  // Storage value (empty for delete operations)
  bytes value = 3;
}

// CrossModuleOp represents a storage operation on a different module's store
message CrossModuleOp {
  // The store key identifying the module (e.g., "bank", "staking")
  string store_key = 1;
  // Storage key within the module's store
  bytes key = 2;
  // Storage value (empty for delete operations)
  bytes value = 3;
  // True if this is a delete operation, false for set
  bool is_delete = 4;
}

// ExecutionTraceData is a single execution trace with its index
message ExecutionTraceData {
  // Execution index within the block
  int64 index = 1;
  // List of storage operations performed during execution
  repeated StorageOp ops = 2 [ (gogoproto.nullable) = false ];
  // Return value from the contract execution
  bytes result = 3;
  // Gas used during execution (compute gas from WASM)
  uint64 gas_used = 4;
  // Gas consumed by callbacks (store operations) during execution
  uint64 callback_gas = 7;
  // Whether the execution resulted in an error
  bool has_error = 5;
  // Error message (if has_error is true)
  string error_msg = 6;
  // List of cross-module storage operations (e.g., bank balance changes)
  repeated CrossModuleOp cross_ops = 8 [ (gogoproto.nullable) = false ];
}

// QueryBlockTracesRequest is the request type for the Query/BlockTraces RPC method
message QueryBlockTracesRequest {
  // Block height to query traces for
  int64 height = 1;
}

// QueryBlockTracesResponse is the response type for the Query/BlockTraces RPC method
message QueryBlockTracesResponse {
  // All execution traces for the block
  repeated ExecutionTraceData traces = 1 [ (gogoproto.nullable) = false ];
}

// QueryMachineIDProofRequest is the request type for the Query/MachineIDProof RPC method
message QueryMachineIDProofRequest {
  // Block height where the machine ID was approved
  int64 height = 1;
  // Machine ID (hex encoded)
  string machine_id = 2;
}

// QueryMachineIDProofResponse is the response type for the Query/MachineIDProof RPC method
message QueryMachineIDProofResponse {
  // Proof bytes (32 bytes)
  bytes proof = 1;
}

// QueryAnalyzeCodeRequest is the request type for the Query/AnalyzeCode RPC method
message QueryAnalyzeCodeRequest {
  // Code hash (raw bytes, typically 32 bytes SHA256)
  bytes code_hash = 1;
}

// QueryAnalyzeCodeResponse is the response type for the Query/AnalyzeCode RPC method
message QueryAnalyzeCodeResponse {
  // Whether the code has IBC entry points (ibc_channel_open, ibc_channel_connect, etc.)
  bool has_ibc_entry_points = 1;
  // Comma-separated list of required features (e.g., "staking", "stargate")
  string required_features = 2;
}

// CreateResultData stores the outcome of a single MsgStoreCode execution
message CreateResultData {
  // SHA256 of the original WASM bytecode
  bytes wasm_hash = 1;
  // Code hash computed by the enclave (empty on error)
  bytes code_hash = 2;
  // Whether the enclave rejected the code
  bool has_error = 3;
  // Error message (if has_error is true)
  string error_msg = 4;
}

// QueryBlockCreateResultsRequest is the request type for the Query/BlockCreateResults RPC method
message QueryBlockCreateResultsRequest {
  // Block height to query Create results for
  int64 height = 1;
}

// QueryBlockCreateResultsResponse is the response type for the Query/BlockCreateResults RPC method
message QueryBlockCreateResultsResponse {
  // All Create results for the block
  repeated CreateResultData results = 1 [ (gogoproto.nullable) = false ];

}